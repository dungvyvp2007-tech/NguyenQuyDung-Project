<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ thống quẩn lý tài chính cá nhân - Đăng nhập</title>
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="signInPage">
      <h1><img src="../assets/icons/Heading 2 → 🔐 Đăng nhập.png" alt=""></h1>
      <p id="successMessage" class="success-message"></p>

      <input type="email" id="emailLogin" placeholder="email..." />
      <p id="errorEmail" class="error-msg">Please enter your email ...</p>

      <input
        type="password"
        id="passwordLogin"
        placeholder="Password..."
      />
      <p id="errorPassword" class="error-msg">Please enter your password ...</p>

      <button type="button" id="loginBtn">Sign in</button>
      <p>You don't have account ?<a href="./register.html">Sign Up Now</a></p>
    </div>
    <script src="../js/login.js"></script>
  </body>
</html>
