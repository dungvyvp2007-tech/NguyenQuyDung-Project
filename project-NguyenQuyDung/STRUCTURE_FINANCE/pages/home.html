<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tài chính cá nhân K25_Rikkei</title>
    <link rel="stylesheet" href="../css/home.css" />
  </head>
  <body>
    <div class="header">
      <p>📒 Tài Chính Cá Nhân K24_Rikkei</p>
      <div class="header-right">
        <div class="account-dropdown" id="accountDropdown">
          <p class="account-btn">Tài khoản <img id="accountToggle" src="../assets/images/Vector (1).png" alt="arrow" /></p>
          <div id="logoutMenu" class="logout-menu hidden">
            <button id="logoutBtn" class="logout-btn">Logout</button>
          </div>
        </div>
      </div>
    </div>
    <div class="layout-container">
    <div class="menu-container">
        <button class="menu-btn solid" onclick="window.location.href='home.html'">
            <img src="../assets/images/Vector (4).png" alt="">
            <span class="text">Information</span>
        </button>

        <button class="menu-btn outline" onclick="window.location.href='category.html'">
            <img src="../assets/images/Vector (5).png" alt="">
            <span class="text">Category</span>
        </button>

        <button class="menu-btn outline" onclick="window.location.href='history.html'">
            <img src="../assets/images/Vector (6).png" alt="">
            <span class="text">History</span>
        </button>
    </div>

    <div class="section">
      <div class="section1">
        <h2>🎯 Kiểm soát chi tiêu thông minh</h2>
        <p>Theo dõi ngân sách và thu chi hằng tháng dễ dàng</p>
      </div>
      <h1>📊 Quản Lý Tài Chính Cá Nhân</h1>
      <div class="section2">
        <p>Số tiền còn lại</p>
        <p id="money">0 VND</p>
      </div>
      <div class="section3">
        <p>
          📅 Chọn tháng:
          <span id="date">
            September 2025
            <img src="../assets/images/Vector (3).png" alt="" />
          </span>
        </p>
      </div>
      <div class="section4">
        <p>
          💰 Ngân sách tháng: <input type="text" placeholder="VD: 50000000" />
          <button>Lưu</button>
        </p>
      </div>
      <h1>Quản Lý Thông tin cá nhân</h1>
      <form>
        <div class="input1">
          <label>Name <span class="times">*</span></label
          ><br />
          <input type="text" value="Nguyen Van A" /><br />
          <label>Phone <span class="times">*</span></label
          ><br />
          <input type="tel" value="0987654321" /><br />
        </div>

        <div class="input2">
          <label>Email <span class="times">*</span></label
          ><br />
          <input type="email" value="nguyenvana@gmail.com" /><br />
          <label>Gender <span class="times">*</span></label
          ><br />
          <select>
            <option value="Male">Male</option>
            <option value="Female">FeMale</option></select
          ><br />
        </div>
      </form>

      <div class="button1">
        <button>Change Information</button>
        <button>Change Password</button>
      </div>
    </div>
  <script src="../js/home.js"></script>
  </body>
</html>
